<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – Paper Review System</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --blue: #4fc3f7;
    --teal: #00e5cc;
    --red: #e94560;
    --text: #e0e0e0;
    --muted: #8892a4;
    --border: rgba(79,195,247,0.15);
    --glow: 0 0 30px rgba(79,195,247,0.15);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background orbs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    animation: float 8s ease-in-out infinite alternate;
  }
  body::before {
    width: 500px; height: 500px;
    background: var(--blue);
    top: -150px; left: -150px;
  }
  body::after {
    width: 400px; height: 400px;
    background: var(--teal);
    bottom: -100px; right: -100px;
    animation-delay: -4s;
  }

  @keyframes float {
    from { transform: translate(0, 0); }
    to   { transform: translate(30px, 30px); }
  }

  .login-wrapper {
    width: 100%;
    max-width: 400px;
    padding: 20px;
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .brand-icon {
    width: 54px; height: 54px;
    background: linear-gradient(135deg, var(--blue), var(--teal));
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 12px;
    box-shadow: 0 8px 24px rgba(79,195,247,0.3);
  }
  .brand h1 {
    font-family: 'Sora', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .brand p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    box-shadow: var(--glow), 0 24px 48px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
  }

  .card h2 {
    font-family: 'Sora', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 24px;
  }

  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(79,195,247,0.12);
  }
  .field input::placeholder { color: var(--muted); }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--blue), var(--teal));
    color: #0f0f1a;
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 0.3px;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 6px 20px rgba(79,195,247,0.3);
  }
  .btn-login:hover {
    opacity: 0.92;
    transform: translateY(-1px);
    box-shadow: 0 10px 28px rgba(79,195,247,0.4);
  }
  .btn-login:active { transform: translateY(0); }

  .error-msg {
    color: var(--red);
    font-size: 13px;
    margin-top: 14px;
    text-align: center;
    display: none;
    padding: 10px;
    background: rgba(233,69,96,0.1);
    border: 1px solid rgba(233,69,96,0.25);
    border-radius: 8px;
  }

  .hint {
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
  }
  .hint code {
    background: var(--surface);
    padding: 2px 7px;
    border-radius: 5px;
    color: var(--teal);
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="login-wrapper">
  <div class="brand">
    <div class="brand-icon">📄</div>
    <h1>Paper Review System</h1>
    <p>Academic marks &amp; query management</p>
  </div>

  <div class="card">
    <h2>Welcome back</h2>

    <form method="post" action="/login" id="loginForm">
      <div class="field">
        <label>Username</label>
        <input name="username" placeholder="Enter your username" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <div class="error-msg" id="errorMsg">⚠ Invalid username or password. Please try again.</div>

    <div class="hint">
      Demo credentials:<br>
      Teacher: <code>teacher1</code> / <code>123</code> &nbsp;|&nbsp; Student: <code>student1</code> / <code>123</code>
    </div>
  </div>
</div>

<script>
if (window.location.search.includes("error")) {
  document.getElementById("errorMsg").style.display = "block";
}

document.querySelector("form").addEventListener("submit", function() {
  let username = document.querySelector("input[name='username']").value;
  if (username.includes("teacher")) {
    localStorage.setItem("role", "TEACHER");
  } else {
    localStorage.setItem("role", "STUDENT");
  }
});
</script>

</body>
</html>
