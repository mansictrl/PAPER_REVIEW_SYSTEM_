<!-- === src/main/resources/static/registerTeacher.html === -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Teacher - Paper Review</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f0f1a; --card: #16213e; --surface: #1a1a2e; --blue: #4fc3f7; --teal: #00e5cc; --red: #e94560; --green: #10b981; --purple: #a78bfa; --text: #e0e0e0; --muted: #8892a4; --border: rgba(79,195,247,0.15); }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  .navbar { background: rgba(22,33,62,0.96); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 62px; }
  .brand { display: flex; align-items: center; gap: 10px; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); text-decoration: none; }
  .logo { width: 32px; height: 32px; background: linear-gradient(135deg, var(--purple), var(--blue)); border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; padding: 7px 14px; border-radius: 8px; margin-left: 4px; }
  .nav-links a:hover { color: var(--text); background: rgba(79,195,247,0.08); }
  .nav-links a.logout { color: var(--red); border: 1px solid rgba(233,69,96,0.28); }
  .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
  .form-wrap { width: 100%; max-width: 480px; }
  .back-link { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); text-decoration: none; margin-bottom: 22px; }
  .back-link:hover { color: var(--blue); }
  .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 36px 32px; }
  .form-card h2 { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .form-card p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 8px; }
  .field input, .field select { width: 100%; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; appearance: none; }
  .field input:focus, .field select:focus { border-color: var(--purple); }
  .field input::placeholder { color: var(--muted); }
  .checkbox-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .checkbox-label { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; transition: border-color 0.2s, background 0.2s; }
  .checkbox-label:has(input:checked) { border-color: var(--purple); background: rgba(167,139,250,0.08); color: var(--purple); }
  .checkbox-label input { accent-color: var(--purple); width: 15px; height: 15px; }
  .btn-create { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--purple), var(--blue)); color: #0f0f1a; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; margin-top: 8px; }
  .btn-create:hover { opacity: 0.92; }
  .msg { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 14px; text-align: center; display: none; }
  .msg.ok  { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--green); }
  .msg.err { background: rgba(233,69,96,0.1);  border: 1px solid rgba(233,69,96,0.3);  color: var(--red); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body>
<nav class="navbar">
  <a href="/admin.html" class="brand"><span class="logo">&#128737;</span> Paper Review</a>
  <div class="nav-links">
    <a href="/admin.html">Admin Dashboard</a>
    <a href="/logout" class="logout">Logout</a>
  </div>
</nav>

<div class="main">
  <div class="form-wrap">
    <a href="/admin.html" class="back-link">&#8592; Back to Admin Dashboard</a>
    <div class="form-card">
      <h2>Add New Teacher</h2>
      <p>Create a teacher account and assign their subject(s) and division(s).</p>

      <div class="field">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="e.g. Prof. Sharma">
      </div>
      <div class="field">
        <label>Username (for login)</label>
        <input type="text" id="username" placeholder="e.g. sharma_t">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Set a password">
      </div>

      <!-- Subject assignment — checkboxes -->
      <div class="field">
        <label>Assigned Subjects</label>
        <p class="hint">Select the subjects this teacher will handle.</p>
        <div class="checkbox-row">
          <label class="checkbox-label"><input type="checkbox" name="subject" value="1"> ADS (1)</label>
          <label class="checkbox-label"><input type="checkbox" name="subject" value="2"> Java (2)</label>
          <label class="checkbox-label"><input type="checkbox" name="subject" value="3"> TOC (3)</label>
          <label class="checkbox-label"><input type="checkbox" name="subject" value="4"> DBMS (4)</label>
        </div>
      </div>

      <!-- Division assignment — checkboxes -->
      <div class="field">
        <label>Assigned Divisions</label>
        <p class="hint">Select the divisions this teacher will handle.</p>
        <div class="checkbox-row">
          <label class="checkbox-label"><input type="checkbox" name="division" value="A"> Division A</label>
          <label class="checkbox-label"><input type="checkbox" name="division" value="B"> Division B</label>
          <label class="checkbox-label"><input type="checkbox" name="division" value="C"> Division C</label>
          <label class="checkbox-label"><input type="checkbox" name="division" value="D"> Division D</label>
        </div>
      </div>

      <button class="btn-create" onclick="createTeacher()">Create Teacher Account</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>
</div>

<script>
  function createTeacher() {
    var name     = document.getElementById('name').value.trim();
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value.trim();

    // Collect checked subjects as comma-separated string e.g. "1,3"
    var subjectIds = Array.from(document.querySelectorAll('input[name="subject"]:checked'))
                         .map(function(cb) { return cb.value; }).join(',');

    // Collect checked divisions as comma-separated string e.g. "A,B"
    var divisions  = Array.from(document.querySelectorAll('input[name="division"]:checked'))
                         .map(function(cb) { return cb.value; }).join(',');

    if (!name || !username || !password) { showMsg('Please fill all required fields.', false); return; }
    if (!subjectIds) { showMsg('Please assign at least one subject.', false); return; }
    if (!divisions)  { showMsg('Please assign at least one division.', false); return; }

    var fd = new FormData();
    fd.append('name',       name);
    fd.append('username',   username);
    fd.append('password',   password);
    fd.append('subjectIds', subjectIds);
    fd.append('divisions',  divisions);

    fetch('/register/teacher', { method: 'POST', body: fd })
      .then(function(r) { return r.text(); })
      .then(function(t) {
        var ok = !t.startsWith('ERROR');
        showMsg(ok ? 'Teacher created successfully!' : t, ok);
        if (ok) {
          document.getElementById('name').value = '';
          document.getElementById('username').value = '';
          document.getElementById('password').value = '';
          document.querySelectorAll('input[type="checkbox"]').forEach(function(cb) { cb.checked = false; });
        }
      })
      .catch(function() { showMsg('Failed. Please try again.', false); });
  }

  function showMsg(text, ok) {
    var el = document.getElementById('msg');
    el.textContent  = text;
    el.className    = 'msg ' + (ok ? 'ok' : 'err');
    el.style.display = 'block';
  }
</script>
</body>
</html>
