<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Teachers - Paper Review</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a; --card: #16213e; --surface: #1a1a2e;
    --blue: #4fc3f7; --teal: #00e5cc; --red: #e94560;
    --green: #10b981; --purple: #a78bfa;
    --text: #e0e0e0; --muted: #8892a4; --border: rgba(79,195,247,0.15);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .navbar { background: rgba(22,33,62,0.96); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 62px; position: sticky; top: 0; z-index: 100; }
  .brand { display: flex; align-items: center; gap: 10px; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); text-decoration: none; }
  .logo { width: 32px; height: 32px; background: linear-gradient(135deg, var(--purple), var(--blue)); border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; padding: 7px 14px; border-radius: 8px; margin-left: 4px; }
  .nav-links a:hover { color: var(--text); background: rgba(79,195,247,0.08); }
  .nav-links a.logout { color: var(--red); border: 1px solid rgba(233,69,96,0.28); }
  .main { max-width: 920px; margin: 0 auto; padding: 44px 24px; }
  .page-header { margin-bottom: 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .page-header h1 { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 700; background: linear-gradient(135deg, var(--text), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .page-header p { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .btn-add { padding: 10px 22px; background: linear-gradient(135deg, var(--purple), var(--blue)); color: #0f0f1a; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 14px; border: none; border-radius: 9px; cursor: pointer; text-decoration: none; display: inline-block; }
  .table-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .table-top { padding: 14px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-top h3 { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; }
  .btn-refresh { padding: 6px 14px; background: rgba(79,195,247,0.08); border: 1px solid rgba(79,195,247,0.25); color: var(--blue); font-size: 12px; font-weight: 600; border-radius: 8px; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: rgba(79,195,247,0.07); padding: 11px 16px; font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.8px; text-align: left; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
  tbody tr:hover { background: rgba(79,195,247,0.04); }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 12px 16px; font-size: 14px; vertical-align: middle; }
  .subj-chip { display: inline-block; padding: 3px 9px; background: rgba(0,229,204,0.08); border: 1px solid rgba(0,229,204,0.2); border-radius: 5px; font-size: 12px; font-weight: 700; color: var(--teal); margin-right: 4px; }
  .div-chip  { display: inline-block; padding: 3px 9px; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.2); border-radius: 5px; font-size: 12px; font-weight: 700; color: var(--purple); margin-right: 4px; }
  .btn-edit { padding: 5px 12px; background: rgba(79,195,247,0.08); border: 1px solid rgba(79,195,247,0.25); color: var(--blue); font-size: 12px; font-weight: 600; border-radius: 7px; cursor: pointer; margin-right: 6px; }
  .btn-del  { padding: 5px 12px; background: rgba(233,69,96,0.08); border: 1px solid rgba(233,69,96,0.25); color: var(--red); font-size: 12px; font-weight: 600; border-radius: 7px; cursor: pointer; }
  .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
  /* Modal */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 32px; width: 100%; max-width: 440px; }
  .modal h3 { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .modal-field { margin-bottom: 16px; }
  .modal-field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 7px; }
  .modal-field input { width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
  .modal-field input:focus { border-color: var(--blue); }
  .modal-field small { display: block; color: var(--muted); font-size: 11px; margin-top: 5px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn-save { flex: 1; padding: 12px; background: linear-gradient(135deg, var(--blue), var(--teal)); color: #0f0f1a; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 14px; border: none; border-radius: 9px; cursor: pointer; }
  .btn-cancel { padding: 12px 20px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Sora', sans-serif; font-weight: 600; font-size: 14px; border-radius: 9px; cursor: pointer; }
  .modal-msg { margin-top: 12px; font-size: 13px; text-align: center; }
  .modal-msg.ok  { color: var(--green); }
  .modal-msg.err { color: var(--red); }
</style>
</head>
<body>

<nav class="navbar">
  <a href="/admin.html" class="brand"><span class="logo">&#9632;</span> Paper Review</a>
  <div class="nav-links">
    <a href="/admin.html">Admin</a>
    <a href="/manage-teachers.html" style="color:var(--purple)">Teachers</a>
    <a href="/logout" class="logout">Logout</a>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <div>
      <h1>Teacher Management</h1>
      <p>View, edit assignments, and delete teacher accounts</p>
    </div>
    <a href="/registerTeacher.html" class="btn-add">+ Add New Teacher</a>
  </div>

  <div class="table-wrapper">
    <div class="table-top">
      <h3>All Teachers</h3>
      <button class="btn-refresh" onclick="loadTeachers()">Refresh</button>
    </div>
    <div id="teacherTable">
      <div class="empty-state">Loading...</div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Edit Teacher Assignment</h3>
    <div class="modal-field">
      <label>Username</label>
      <input type="text" id="editUsername" readonly style="opacity:0.6">
    </div>
    <div class="modal-field">
      <label>Subject IDs (comma-separated)</label>
      <input type="text" id="editSubjectIds" placeholder="e.g. 1,3">
      <small>1=ADS &nbsp; 2=Java &nbsp; 3=TOC &nbsp; 4=DBMS</small>
    </div>
    <div class="modal-field">
      <label>Divisions (comma-separated)</label>
      <input type="text" id="editDivisions" placeholder="e.g. A,B">
      <small>Allowed values: A, B, C, D</small>
    </div>
    <div class="modal-msg" id="editMsg"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  var SUBJECT_MAP = { '1':'ADS', '2':'Java', '3':'TOC', '4':'DBMS' };

  function loadTeachers() {
    document.getElementById('teacherTable').innerHTML = '<div class="empty-state">Loading...</div>';

    fetch('/admin/teachers')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data || data.length === 0) {
          document.getElementById('teacherTable').innerHTML =
            '<div class="empty-state">No teachers found. Add one via the button above.</div>';
          return;
        }

        var rows = data.map(function(t) {
          // Format subject IDs as named chips
          var subjHtml = (t.subjectIds || '').split(',').filter(Boolean).map(function(s) {
            return '<span class="subj-chip">' + (SUBJECT_MAP[s.trim()] || s.trim()) + '</span>';
          }).join('') || '<span style="color:var(--muted)">None</span>';

          // Format divisions as chips
          var divHtml = (t.divisions || '').split(',').filter(Boolean).map(function(d) {
            return '<span class="div-chip">Div ' + d.trim() + '</span>';
          }).join('') || '<span style="color:var(--muted)">None</span>';

          return '<tr>' +
            '<td style="font-weight:600">' + (t.name || '-') + '</td>' +
            '<td style="color:var(--blue)">' + (t.username || '-') + '</td>' +
            '<td>' + subjHtml + '</td>' +
            '<td>' + divHtml + '</td>' +
            '<td>' +
              '<button class="btn-edit" onclick="openEditModal(\'' +
                (t.username||'').replace(/'/g,"\\'") + '\',\'' +
                (t.subjectIds||'').replace(/'/g,"\\'") + '\',\'' +
                (t.divisions||'').replace(/'/g,"\\'") + '\')">Edit</button>' +
              '<button class="btn-del" onclick="deleteTeacher(\'' + (t.username||'').replace(/'/g,"\\'") + '\')">Delete</button>' +
            '</td>' +
          '</tr>';
        }).join('');

        document.getElementById('teacherTable').innerHTML =
          '<table><thead><tr>' +
            '<th>Name</th><th>Username</th><th>Subjects</th><th>Divisions</th><th>Actions</th>' +
          '</tr></thead><tbody>' + rows + '</tbody></table>';
      })
      .catch(function() {
        document.getElementById('teacherTable').innerHTML =
          '<div class="empty-state">Failed to load. Is the server running?</div>';
      });
  }

  function openEditModal(username, subjectIds, divisions) {
    document.getElementById('editUsername').value   = username;
    document.getElementById('editSubjectIds').value = subjectIds;
    document.getElementById('editDivisions').value  = divisions;
    document.getElementById('editMsg').textContent  = '';
    document.getElementById('editMsg').className    = 'modal-msg';
    document.getElementById('editModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('open');
  }

  function saveEdit() {
    var username   = document.getElementById('editUsername').value;
    var subjectIds = document.getElementById('editSubjectIds').value.trim();
    var divisions  = document.getElementById('editDivisions').value.trim();

    if (!subjectIds || !divisions) {
      showMsg('Please fill both fields.', false); return;
    }

    var fd = new FormData();
    fd.append('username',   username);
    fd.append('subjectIds', subjectIds);
    fd.append('divisions',  divisions);

    fetch('/register/teacher/assign', { method: 'POST', body: fd })
      .then(function(r) { return r.text(); })
      .then(function(msg) {
        var ok = !msg.startsWith('ERROR');
        showMsg(ok ? 'Assignment updated!' : msg, ok);
        if (ok) setTimeout(function() { closeModal(); loadTeachers(); }, 1000);
      })
      .catch(function() { showMsg('Request failed.', false); });
  }

  function deleteTeacher(username) {
    if (!confirm('Delete teacher "' + username + '"?\nThis also removes their login account.')) return;

    fetch('/register/teacher/' + username, { method: 'DELETE' })
      .then(function(r) { return r.text(); })
      .then(function(msg) { alert(msg); loadTeachers(); })
      .catch(function() { alert('Delete request failed.'); });
  }

  function showMsg(text, ok) {
    var el = document.getElementById('editMsg');
    el.textContent = text;
    el.className   = 'modal-msg ' + (ok ? 'ok' : 'err');
  }

  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  window.onload = loadTeachers;
</script>
</body>
</html>
