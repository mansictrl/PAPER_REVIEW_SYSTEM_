<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Paper Review System</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #e2e8f0;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 18px 40px;
    background: #0f172a;
}

.logo {
    font-family: 'Sora';
    font-size: 18px;
    font-weight: bold;
    color: #38bdf8;
}

/* MAIN */
.main {
    text-align: center;
    padding: 80px 20px;
}

.main h1 {
    font-size: 42px;
    font-family: 'Sora';
    margin-bottom: 10px;
}

.main p {
    color: #94a3b8;
    font-size: 16px;
    margin-bottom: 40px;
}

/* BUTTON */
.btn {
    padding: 12px 24px;
    background: linear-gradient(135deg, #38bdf8, #3b82f6);
    border-radius: 8px;
    text-decoration: none;
    color: white;
    font-weight: 600;
}

/* FEATURES */
.features {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 60px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 220px;
}

/* FOOTER */
.footer {
    margin-top: 80px;
    padding: 20px;
    text-align: center;
    color: #64748b;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">📄 Paper Review</div>
</div>

<!-- MAIN -->
<div class="main">
    <h1>Paper Review System</h1>
    <p>A smart academic platform to manage marks, queries, and performance analysis.</p>

    <a href="/login.html" class="btn">Login to Continue</a>

    <!-- FEATURES -->
    <div class="features">
        <div class="card">
            <h3>Students</h3>
            <p>View marks & raise queries</p>
        </div>

        <div class="card">
            <h3>Teachers</h3>
            <p>Enter marks & resolve queries</p>
        </div>

        <div class="card">
            <h3>Admin</h3>
            <p>Manage users & view analytics</p>
        </div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <p><b>College:</b> MIT AOE </p>
    <p><b>Developed By:</b> Swapnil & Mansi</p>
</div>

</body>
</html>
